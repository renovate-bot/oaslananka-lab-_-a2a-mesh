name: Branch Cleanup

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  cleanup:
    name: Delete merged branch
    if: >-
      github.repository == 'oaslananka-lab/a2a-mesh' &&
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Delete branch
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            if (['main', 'develop', 'release'].includes(branch)) {
              core.info(`Skipping protected branch: ${branch}`);
              return;
            }

            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`,
              });
              core.info(`Deleted branch: ${branch}`);
            } catch (error) {
              core.warning(`Could not delete branch ${branch}: ${error.message}`);
            }
