name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

jobs:
  gitleaks:
    name: Gitleaks (secret scan)
    if: github.repository == 'oaslananka-lab/a2a-mesh'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Gitleaks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release download v8.30.1 \
            --repo gitleaks/gitleaks \
            --pattern "gitleaks_8.30.1_linux_x64.tar.gz" \
            --output gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks
        run: |
          set -euo pipefail
          gitleaks detect --source . --config .gitleaks.toml --redact --verbose

  trivy:
    name: Trivy (filesystem)
    if: github.repository == 'oaslananka-lab/a2a-mesh'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Trivy FS scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e
        with:
          sarif_file: trivy-results.sarif

  pnpm-audit:
    name: pnpm audit
    if: github.repository == 'oaslananka-lab/a2a-mesh'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable pnpm
        run: |
          set -euo pipefail
          corepack enable

      - name: Install dependencies
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: |
          set -euo pipefail
          pnpm audit --audit-level high --prod

  scorecard:
    name: OSSF Scorecard
    if: >-
      github.repository == 'oaslananka-lab/a2a-mesh' &&
      (github.event_name == 'push' || github.event_name == 'schedule')
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard JSON
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a
        with:
          results_file: scorecard-results.json
          results_format: json
          publish_results: true

      - name: Enforce Scorecard threshold
        run: |
          set -euo pipefail
          node -e "const fs=require('node:fs'); const data=JSON.parse(fs.readFileSync('scorecard-results.json','utf8')); const score=Number(data.score); if (!Number.isFinite(score) || score < 7) { throw new Error(`OSSF Scorecard ${score} is below 7.0`); } console.log(`OSSF Scorecard ${score} >= 7.0`);"

      - name: Run OSSF Scorecard SARIF
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: false

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: scorecard-results
          path: |
            scorecard-results.json
            scorecard-results.sarif
          retention-days: 5

      - uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e
        if: always()
        with:
          sarif_file: scorecard-results.sarif

  workflow-security:
    name: Workflow security (zizmor)
    if: github.repository == 'oaslananka-lab/a2a-mesh'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Run zizmor
        run: |
          set -euo pipefail
          curl -LsSf https://astral.sh/uv/install.sh | sh
          "$HOME/.local/bin/uvx" zizmor .github/workflows/ --min-severity medium
