name: CI (Org Auto / Manual)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    if: >-
      (github.repository == 'oaslananka-lab/a2a-mesh' ||
       github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'pull_request' ||
       github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.22.2, 24.14.1]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            docs-site/package-lock.json

      - name: Pin npm 10.9.8
        run: npm install --global npm@10.9.8

      - name: Install Dependencies
        run: npm ci

      - name: Install docs-site dependencies
        run: npm ci --prefix docs-site

      - name: Link check (non-blocking)
        run: npx lychee --config .lychee.toml docs-site --offline || true

      - name: Install Playwright Browsers
        run: npm run ui:install:browsers

      - name: Run CI check
        run: npm run check

      - name: Upload coverage to Codecov
        if: >-
          matrix.node-version == '22.22.2' &&
          github.actor != 'dependabot[bot]' &&
          (
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          )
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        continue-on-error: true
        with:
          files: ./coverage/lcov.info
          flags: unit
