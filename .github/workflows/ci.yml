name: CI (Org Auto / Manual)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    if: github.repository_owner == 'oaslananka-lab' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.20.2, 22.22.2, 24.14.1]

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            docs-site/package-lock.json

      - name: Pin npm 10.9.8
        run: npm install --global npm@10.9.8

      - name: Install Dependencies
        run: npm ci

      - name: Install docs-site dependencies
        run: npm ci --prefix docs-site

      - name: Link check (non-blocking)
        run: npx lychee --config .lychee.toml docs-site --offline || true

      - name: Install Playwright Browsers
        run: npm run ui:install:browsers

      - name: Run CI check
        run: npm run check
