name: CI (Org Auto / Manual)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    if: github.repository_owner == 'oaslananka-lab' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.20.2, 22.22.2, 24.14.1]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install docs-site dependencies
        run: npm ci --prefix docs-site

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Markdown lint
        run: npm run lint:md

      - name: Link check (non-blocking)
        run: npx lychee --config .lychee.toml docs-site --offline || true

      - name: Type Check
        run: npm run typecheck

      - name: Build Packages
        run: npm run build:packages

      - name: Unit Tests & Coverage
        run: npm run test:coverage

      - name: Integration Tests
        run: npm run test:integration

      - name: Install Playwright Browsers
        run: cd apps/registry-ui && npx playwright install --with-deps chromium

      - name: UI Smoke Tests (E2E)
        run: cd apps/registry-ui && npx playwright test
