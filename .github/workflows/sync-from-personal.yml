name: Sync from Personal

on:
  schedule:
    - cron: '11 * * * *'
  repository_dispatch:
    types: [personal-repo-updated]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-personal-main
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  sync:
    name: Sync personal main to organization
    if: github.repository == 'oaslananka-lab/a2a-mesh'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PERSONAL_REPO: oaslananka/a2a-mesh
      ORG_REPO: oaslananka-lab/a2a-mesh
      SYNC_BRANCH: sync/personal-main
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Fetch personal source
        run: |
          set -euo pipefail
          git remote add personal "https://github.com/${PERSONAL_REPO}.git"
          git fetch personal main --tags --prune
          git fetch origin main --prune

      - name: Prepare sync branch
        id: diff
        run: |
          set -euo pipefail
          personal_sha="$(git rev-parse personal/main)"
          org_sha="$(git rev-parse origin/main)"
          echo "personal_sha=${personal_sha}" >> "${GITHUB_OUTPUT}"
          echo "org_sha=${org_sha}" >> "${GITHUB_OUTPUT}"
          if [ "${personal_sha}" = "${org_sha}" ]; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git config user.email "sync@github.com"
          git config user.name "Repository Sync"
          git switch --force-create "${SYNC_BRANCH}" "${personal_sha}"
          git push origin "HEAD:${SYNC_BRANCH}" --force-with-lease
          echo "changed=true" >> "${GITHUB_OUTPUT}"

      - name: Open or update sync pull request
        if: steps.diff.outputs.changed == 'true'
        run: |
          set -euo pipefail
          title="chore(sync): mirror personal main"
          body="Synchronizes the organization mirror with oaslananka/a2a-mesh main."
          existing="$(gh pr list \
            --repo "${ORG_REPO}" \
            --head "${SYNC_BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"
          if [ -n "${existing}" ]; then
            gh pr edit "${existing}" \
              --repo "${ORG_REPO}" \
              --title "${title}" \
              --body "${body}"
          else
            gh pr create \
              --repo "${ORG_REPO}" \
              --base main \
              --head "${SYNC_BRANCH}" \
              --title "${title}" \
              --body "${body}"
          fi

      - name: Sync release tags
        run: |
          set -euo pipefail
          git push origin 'refs/tags/v*:refs/tags/v*'
