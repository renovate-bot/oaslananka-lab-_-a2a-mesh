name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  release:
    name: Release Please
    if: github.repository == 'oaslananka-lab/a2a-mesh'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release-assets:
    name: Build and attach release assets
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_TAG: ${{ needs.release.outputs.tag_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          ref: ${{ github.sha }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.14.1

      - name: Enable pnpm
        run: |
          set -euo pipefail
          corepack enable

      - name: Install dependencies
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile

      - name: Run release build
        run: |
          set -euo pipefail
          pnpm run build

      - name: Pack release tarballs
        run: |
          set -euo pipefail
          pnpm run pack:release
          mkdir -p .artifacts/release
          cp .artifacts/npm/*.tgz .artifacts/release/

      - name: Generate SBOM
        run: |
          set -euo pipefail
          pnpm sbom --sbom-format cyclonedx --lockfile-only \
            > .artifacts/release/sbom.cdx.json

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd .artifacts/release
          file_list="$(mktemp)"
          find . -maxdepth 1 -type f ! -name SHA256SUMS -print0 \
            | sort -z \
            > "${file_list}"
          xargs -0 sha256sum < "${file_list}" > SHA256SUMS
          rm -f "${file_list}"

      - name: Generate provenance attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: .artifacts/release/*

      - name: Attach assets to release
        run: |
          set -euo pipefail
          gh release upload "${RELEASE_TAG}" .artifacts/release/*

      - name: Verify release assets
        run: |
          set -euo pipefail
          gh release view "${RELEASE_TAG}" --json tagName,isDraft,assets \
            --jq ". as \$release | if (\$release.isDraft == false and (\$release.assets | length) >= 3) then \$release.tagName else error(\"release assets missing\") end"
