name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  release:
    name: Release Please
    if: github.repository == 'oaslananka-lab/a2a-mesh'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_data: ${{ toJSON(steps.release.outputs) }}
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release-assets:
    name: Build and attach release assets
    needs: release
    if: >-
      ${{
        (
          needs.release.outputs.paths_released != '' &&
          needs.release.outputs.paths_released != '[]'
        ) ||
        github.event_name == 'workflow_dispatch'
      }}
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_DATA: ${{ needs.release.outputs.release_data }}
      RELEASES_CREATED: ${{ needs.release.outputs.releases_created }}
      PATHS_RELEASED: ${{ needs.release.outputs.paths_released }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          ref: ${{ github.sha }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.14.1

      - name: Enable pnpm
        run: |
          set -euo pipefail
          corepack enable

      - name: Install dependencies
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile

      - name: Run release build
        run: |
          set -euo pipefail
          pnpm run build

      - name: Pack release tarballs
        run: |
          set -euo pipefail
          pnpm run pack:release
          mkdir -p .artifacts/release
          cp .artifacts/npm/*.tgz .artifacts/release/

      - name: Resolve release tags
        run: |
          set -euo pipefail
          node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const { writeFileSync } = require('node:fs');
          const releaseData = JSON.parse(process.env.RELEASE_DATA || '{}');
          const paths = JSON.parse(process.env.PATHS_RELEASED || '[]');
          const tags = [];

          if (process.env.RELEASES_CREATED === 'true') {
            for (const path of paths) {
              const key = path === '.' ? 'tag_name' : `${path}--tag_name`;
              if (releaseData[key]) tags.push(releaseData[key]);
            }
          } else {
            const releases = JSON.parse(execFileSync('gh', [
              'release',
              'list',
              '--limit',
              '100',
              '--json',
              'tagName,isDraft',
            ], { encoding: 'utf8' }));
            for (const release of releases) {
              if (release.isDraft) continue;
              const assets = JSON.parse(execFileSync('gh', [
                'release',
                'view',
                release.tagName,
                '--json',
                'assets',
              ], { encoding: 'utf8' })).assets;
              if (assets.length === 0) tags.push(release.tagName);
            }
          }

          const uniqueTags = [...new Set(tags)].filter(Boolean).sort();
          if (uniqueTags.length === 0) {
            throw new Error('No release tags resolved for asset upload');
          }
          writeFileSync('.artifacts/release-tags.txt', `${uniqueTags.join('\n')}\n`);
          NODE

      - name: Generate SBOM
        run: |
          set -euo pipefail
          pnpm sbom --sbom-format cyclonedx --lockfile-only \
            > .artifacts/release/sbom.cdx.json

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd .artifacts/release
          file_list="$(mktemp)"
          find . -maxdepth 1 -type f ! -name SHA256SUMS -print0 \
            | sort -z \
            > "${file_list}"
          xargs -0 sha256sum < "${file_list}" > SHA256SUMS
          rm -f "${file_list}"

      - name: Generate provenance attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: .artifacts/release/*

      - name: Attach assets to release
        run: |
          set -euo pipefail
          while IFS= read -r release_tag; do
            gh release upload "${release_tag}" .artifacts/release/* --clobber
          done < .artifacts/release-tags.txt

      - name: Verify release assets
        run: |
          set -euo pipefail
          while IFS= read -r release_tag; do
            gh release view "${release_tag}" --json tagName,isDraft,assets \
              --jq ". as \$release | if (\$release.isDraft == false and (\$release.assets | length) >= 3) then \$release.tagName else error(\"release assets missing\") end"
          done < .artifacts/release-tags.txt
