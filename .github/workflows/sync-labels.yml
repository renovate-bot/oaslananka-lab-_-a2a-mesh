name: Sync Labels

on:
  push:
    branches: [main]
    paths:
      - .github/labels.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  sync:
    name: Sync labels from labels.yml
    if: github.repository == 'oaslananka-lab/a2a-mesh'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Sync labels from config
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          ruby <<'RUBY'
          require 'json'
          require 'open3'
          require 'yaml'

          repo = ENV.fetch('REPO')
          labels = YAML.load_file('.github/labels.yml') || []

          labels.each do |label|
            name = label.fetch('name')
            payload = JSON.dump({
              new_name: name,
              color: label.fetch('color'),
              description: label.fetch('description', '')
            })
            _stdout, _stderr, status = Open3.capture3(
              'gh', 'api', "repos/#{repo}/labels/#{name}", '-X', 'PATCH', '--input', '-', '--silent',
              stdin_data: payload
            )
            if status.success?
              puts "updated #{name}"
              next
            end

            create_payload = JSON.dump({
              name: name,
              color: label.fetch('color'),
              description: label.fetch('description', '')
            })
            _stdout, stderr, create_status = Open3.capture3(
              'gh', 'api', "repos/#{repo}/labels", '-X', 'POST', '--input', '-', '--silent',
              stdin_data: create_payload
            )
            unless create_status.success?
              warn stderr
              exit create_status.exitstatus
            end
            puts "created #{name}"
          end
          RUBY
