version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      repo-toolchain:
        patterns:
          - '*'

  - package-ecosystem: npm
    directory: /docs-site
    schedule:
      interval: weekly
    open-pull-requests-limit: 2

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
