workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always
    - when: never

stages:
  - verify
  - docs
  - package

default:
  interruptible: true

variables:
  NODE_ENV: development
  PNPM_HOME: '$CI_PROJECT_DIR/.pnpm'
  A2A_NODE_IMAGE: 'node:24-bookworm@sha256:3a198147c320bc4cc357b418955beb48413c0ea5ba60f9ec1568913631df33aa'
  A2A_HELM_IMAGE: 'alpine/helm:3.16.4@sha256:1e607ea8160ba964267d864592a742489105976044e3e49e9615e11f05d44ba2'
  DOPPLER_PROJECT: 'all'
  DOPPLER_CONFIG: 'main'

cache:
  key:
    files:
      - pnpm-lock.yaml
  paths:
    - .pnpm/

.manual_job_rules: &manual_job_rules
  rules:
    - when: manual

.node_job: &node_job
  image: $A2A_NODE_IMAGE
  before_script:
    - bash scripts/setup-node.sh '24.14.1'
    - node --version
    - pnpm --version
    - pnpm install --frozen-lockfile
  <<: *manual_job_rules

.helm_job: &helm_job
  image: $A2A_HELM_IMAGE
  before_script:
    - helm version
  <<: *manual_job_rules

runner_probe:
  <<: *node_job
  stage: verify
  script:
    - 'echo "Pipeline source: ${CI_PIPELINE_SOURCE}"'
    - 'echo "Runner description: ${CI_RUNNER_DESCRIPTION:-unknown}"'
    - 'echo "Runner tags: ${CI_RUNNER_TAGS:-none}"'
    - node --version
    - pnpm --version
    - 'if command -v helm >/dev/null 2>&1; then helm version; else echo "helm not available on this runner"; fi'

quality_gate:
  <<: *node_job
  stage: verify
  script:
    - pnpm run ui:install:browsers
    - pnpm run check
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - coverage/
      - test-results/

docs_build:
  <<: *node_job
  stage: docs
  script:
    - pnpm run docs:build
  artifacts:
    expire_in: 7 days
    paths:
      - docs-site/.vitepress/dist/

package_workspace:
  <<: *node_job
  stage: package
  script:
    - mkdir -p .artifacts/npm
    - pnpm run pack:release
  artifacts:
    expire_in: 7 days
    paths:
      - .artifacts/npm/

doppler_probe:
  <<: *node_job
  stage: verify
  script:
    - bash scripts/ci/install-doppler-cli.sh
    - bash scripts/ci/doppler-required.sh NPM_TOKEN

publish_npm:
  <<: *node_job
  stage: package
  script:
    - bash scripts/ci/install-doppler-cli.sh
    - pnpm run ui:install:browsers
    - pnpm run check
    - bash scripts/ci/publish-with-doppler.sh

helm_bundle:
  <<: *helm_job
  stage: package
  script:
    - mkdir -p .artifacts/helm
    - helm lint deployments/helm/a2a-mesh
    - helm template a2a-mesh deployments/helm/a2a-mesh > .artifacts/helm/a2a-mesh-rendered.yaml
    - helm package deployments/helm/a2a-mesh --destination .artifacts/helm
  artifacts:
    expire_in: 7 days
    paths:
      - .artifacts/helm/
