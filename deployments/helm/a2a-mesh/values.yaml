image:
  repository: ghcr.io/oaslananka-lab/a2a-mesh
  tag: '1.4.0'
  digest: ''
  pullPolicy: IfNotPresent

networkPolicy:
  enabled: false
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: ''
  host: a2a-mesh.local

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
