{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: a2a-mesh-egress
  namespace: '{{ .Release.Namespace }}'
spec:
  podSelector:
    matchLabels:
      app: a2a-mesh
  policyTypes:
    - Egress
  egress:
    {{- toYaml .Values.networkPolicy.egress | nindent 4 }}
{{- end }}
