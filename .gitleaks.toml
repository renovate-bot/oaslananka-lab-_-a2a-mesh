title = "a2a-mesh gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = "Test fixtures and examples"
paths = [
  '''tests/.*''',
  '''packages/testing/src/fixtures/.*''',
  '''apps/demo/\.env\.example''',
  '''\.env\.example''',
]
regexes = [
  '''EXAMPLE_''',
  '''test[-_]?(key|secret|token|password)''',
]
