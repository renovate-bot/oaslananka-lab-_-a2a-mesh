parameters:
  - name: nodeVersion
    type: string
    default: '24.14.1'

jobs:
  - job: verify
    displayName: 'Verify monorepo'
    pool:
      vmImage: 'ubuntu-24.04'
    variables:
      pnpm_config_cache: $(Pipeline.Workspace)/.pnpm
    steps:
      - checkout: self
        fetchDepth: 0

      - script: |
          set -euo pipefail
          bash scripts/setup-node.sh '${{ parameters.nodeVersion }}'
        displayName: 'Setup Node.js ${{ parameters.nodeVersion }} + pnpm'

      - task: Cache@2
        displayName: 'Cache pnpm packages'
        inputs:
          key: 'pnpm | "$(Agent.OS)" | pnpm-lock.yaml'
          restoreKeys: |
            pnpm | "$(Agent.OS)"
          path: $(pnpm_config_cache)

      - script: |
          set -euo pipefail
          pnpm install --frozen-lockfile
        displayName: 'Install dependencies'

      - script: |
          set -euo pipefail
          pnpm run ui:install:browsers
        displayName: 'Install Playwright browsers'

      - script: |
          set -euo pipefail
          pnpm run check
        displayName: 'Run repository check'
        timeoutInMinutes: 20

      - script: |
          set -euo pipefail
          for pkg in packages/core packages/client packages/adapters packages/registry packages/testing packages/ws packages/grpc cli; do
            echo "Smoke testing $pkg..."
            if [ "$pkg" = "cli" ]; then
              if [ -f "./$pkg/dist/index.cjs" ]; then
                node "./$pkg/dist/index.cjs" --help >/dev/null && echo "  ok $pkg"
              else
                echo "  missing $pkg/dist/index.cjs"
              fi
            elif [ -f "./$pkg/dist/index.cjs" ]; then
              node -e "require('./$pkg/dist/index.cjs')" && echo "  ok $pkg"
            else
              echo "  missing $pkg/dist/index.cjs (may be ESM-only)"
            fi
          done
        displayName: 'Smoke test packages'

      - task: PublishTestResults@2
        displayName: 'Publish unit test results'
        condition: always()
        inputs:
          testResultsFormat: 'JUnit'
          testResultsFiles: 'test-results/junit-unit.xml'
          testRunTitle: 'Unit Tests - Node ${{ parameters.nodeVersion }}'

      - task: PublishTestResults@2
        displayName: 'Publish integration test results'
        condition: always()
        inputs:
          testResultsFormat: 'JUnit'
          testResultsFiles: 'test-results/junit-integration.xml'
          testRunTitle: 'Integration Tests - Node ${{ parameters.nodeVersion }}'

      - task: PublishCodeCoverageResults@2
        displayName: 'Publish code coverage'
        condition: always()
        inputs:
          summaryFileLocation: 'coverage/lcov.info'
