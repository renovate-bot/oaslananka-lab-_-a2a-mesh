# Azure DevOps PR verification is intentionally manual. Automated PR CI runs
# from the GitHub organization mirror; run this pipeline explicitly only when
# Azure-specific validation is needed.
trigger: none
pr: none

pool:
  vmImage: 'ubuntu-24.04'

steps:
  - checkout: self
    fetchDepth: 0

  - script: |
      set -euo pipefail
      bash scripts/setup-node.sh '24.14.1'
    displayName: 'Setup Node.js 24.14.1 + pnpm'

  - script: |
      set -euo pipefail
      pnpm install --frozen-lockfile
    displayName: 'Install dependencies'

  - script: |
      set -euo pipefail
      pnpm run ui:install:browsers
    displayName: 'Install Playwright browsers'

  - script: |
      set -euo pipefail
      pnpm run check
    displayName: 'Run repository check'

  - script: |
      set -euo pipefail
      for pkg in packages/core packages/client packages/adapters packages/registry packages/testing packages/ws packages/grpc cli; do
        echo "Smoke testing $pkg..."
        if [ "$pkg" = "cli" ]; then
          if [ -f "./$pkg/dist/index.cjs" ]; then
            node "./$pkg/dist/index.cjs" --help >/dev/null && echo "  ok $pkg"
          else
            echo "  missing $pkg/dist/index.cjs"
          fi
        elif [ -f "./$pkg/dist/index.cjs" ]; then
          node -e "require('./$pkg/dist/index.cjs')" && echo "  ok $pkg"
        else
          echo "  missing $pkg/dist/index.cjs (may be ESM-only)"
        fi
      done
    displayName: 'Smoke test packages'
