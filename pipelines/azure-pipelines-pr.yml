# Azure DevOps PR verification is intentionally manual. Automated PR CI runs
# from the GitHub organization mirror; run this pipeline explicitly only when
# Azure-specific validation is needed.
trigger: none
pr: none

pool:
  vmImage: 'ubuntu-latest'

steps:
  - checkout: self
    fetchDepth: 0

  - script: |
      bash scripts/setup-node.sh '22.22.2' '10.9.8'
    displayName: 'Setup Node.js 22.22.2 + npm 10.9.8'

  - script: npm ci
    displayName: 'Install dependencies'

  - script: npm ci --prefix docs-site --prefer-offline
    displayName: 'Install docs-site dependencies'

  - script: npx lychee --config .lychee.toml docs-site --offline || true
    displayName: 'Link check (non-blocking)'

  - script: npm run ui:install:browsers
    displayName: 'Install Playwright browsers'

  - script: npm run check
    displayName: 'Run repository check'

  - script: |
      for pkg in packages/core packages/client packages/adapters packages/registry packages/testing packages/ws packages/grpc cli; do
        echo "Smoke testing $pkg..."
        if [ "$pkg" = "cli" ]; then
          if [ -f "./$pkg/dist/index.cjs" ]; then
            node "./$pkg/dist/index.cjs" --help >/dev/null && echo "  ✓ $pkg"
          else
            echo "  ⚠ $pkg/dist/index.cjs not found"
          fi
        elif [ -f "./$pkg/dist/index.cjs" ]; then
          node -e "require('./$pkg/dist/index.cjs')" && echo "  ✓ $pkg"
        else
          echo "  ⚠ $pkg/dist/index.cjs not found (may be ESM-only)"
        fi
      done
    displayName: 'Smoke test packages'

  - script: |
      npx changeset status --since=origin/main
    displayName: 'Changeset check'
    continueOnError: false
