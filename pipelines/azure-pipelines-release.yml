trigger: none
pr: none

variables:
  - name: DOPPLER_PROJECT
    value: all
  - name: DOPPLER_CONFIG
    value: main

stages:
  - stage: ValidateRelease
    displayName: 'Validate release automation'
    jobs:
      - job: Validate
        displayName: 'Validate release automation'
        pool:
          vmImage: 'ubuntu-24.04'
        steps:
          - checkout: self
            persistCredentials: false
            fetchDepth: 0

          - script: |
              set -euo pipefail
              bash scripts/setup-node.sh '24.14.1'
            displayName: 'Setup Node.js 24.14.1 + pnpm'

          - script: |
              set -euo pipefail
              pnpm install --frozen-lockfile
            displayName: 'Install dependencies'

          - script: |
              set -euo pipefail
              pnpm run ui:install:browsers
            displayName: 'Install Playwright browsers'

          - script: |
              set -euo pipefail
              pnpm run check
            displayName: 'Run repository check'

          - script: |
              set -euo pipefail
              pnpm audit --audit-level high --prod
            displayName: 'Security audit'

          - script: |
              set -euo pipefail
              pnpm run release:dry-run
            displayName: 'Release config dry run'

  - stage: PublishRelease
    displayName: 'Publish to npm'
    dependsOn: ValidateRelease
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: PublishToNpm
        displayName: 'Publish packages to npm'
        environment: 'npm-production'
        pool:
          vmImage: 'ubuntu-24.04'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                  persistCredentials: false
                  fetchDepth: 0

                - script: |
                    set -euo pipefail
                    bash scripts/setup-node.sh '24.14.1'
                  displayName: 'Setup Node.js 24.14.1 + pnpm'

                - script: |
                    set -euo pipefail
                    pnpm install --frozen-lockfile
                  displayName: 'Install dependencies'

                - script: bash scripts/ci/install-doppler-cli.sh
                  displayName: 'Install Doppler CLI'

                - script: |
                    set -euo pipefail
                    bash scripts/ci/doppler-required.sh NPM_TOKEN
                  displayName: 'Verify Doppler release secrets'
                  env:
                    DOPPLER_TOKEN: $(DOPPLER_TOKEN)
                    DOPPLER_PROJECT: $(DOPPLER_PROJECT)
                    DOPPLER_CONFIG: $(DOPPLER_CONFIG)

                - script: |
                    set -euo pipefail
                    pnpm run pack:release
                  displayName: 'Pack release artifacts'

                - script: |
                    set -euo pipefail
                    bash scripts/ci/publish-with-doppler.sh
                  displayName: 'Publish packages to npm'
                  env:
                    DOPPLER_TOKEN: $(DOPPLER_TOKEN)
                    DOPPLER_PROJECT: $(DOPPLER_PROJECT)
                    DOPPLER_CONFIG: $(DOPPLER_CONFIG)
